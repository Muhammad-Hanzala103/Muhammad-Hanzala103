<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&amp;family=Share+Tech+Mono&amp;display=swap');

      .bg {
        fill: #080B10;
      }

      .grid {
        stroke: #141B29;
        stroke-width: 1;
        opacity: 0.4;
      }

      .title {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        font-size: 42px;
        fill: #ffffff;
        letter-spacing: 5px;
      }

      .subtitle {
        font-family: 'Share Tech Mono', monospace;
        font-size: 18px;
        fill: #00E5FF;
        letter-spacing: 3px;
      }

      /* Glow Effects */
      .glow-green {
        filter: drop-shadow(0px 0px 8px rgba(57, 255, 20, 0.8));
      }
      .glow-cyan {
        filter: drop-shadow(0px 0px 8px rgba(0, 229, 255, 0.8));
      }
      .glow-purple {
        filter: drop-shadow(0px 0px 8px rgba(224, 0, 255, 0.8));
      }

      /* Animations */
      @keyframes pulseGrid {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.6; }
      }

      @keyframes floatParticle {
        0% { transform: translateY(0px) translateX(0px); opacity: 0.2; }
        50% { transform: translateY(-20px) translateX(10px); opacity: 0.8; }
        100% { transform: translateY(-40px) translateX(-5px); opacity: 0; }
      }

      @keyframes scanline {
        0% { transform: translateY(-300px); }
        100% { transform: translateY(300px); }
      }

      @keyframes neonBlink {
        0%, 100% { opacity: 1; text-shadow: 0 0 10px #00E5FF, 0 0 20px #00E5FF, 0 0 30px #00E5FF; }
        50% { opacity: 0.8; text-shadow: 0 0 5px #00E5FF, 0 0 10px #00E5FF; }
      }

      @keyframes drawLine {
        0% { stroke-dashoffset: 800; }
        100% { stroke-dashoffset: 0; }
      }

      @keyframes rotateHub {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .animated-grid {
        animation: pulseGrid 4s infinite ease-in-out;
      }

      .particle-1 { animation: floatParticle 6s infinite linear; }
      .particle-2 { animation: floatParticle 8s infinite linear 2s; }
      .particle-3 { animation: floatParticle 7s infinite linear 4s; }

      .scan {
        animation: scanline 8s infinite linear;
        background: linear-gradient(to bottom, rgba(0, 229, 255, 0), rgba(0, 229, 255, 0.1) 10%, rgba(0, 229, 255, 0) 20%);
        width: 100%;
        height: 50px;
      }

      .blink-text {
        animation: neonBlink 3s infinite alternate;
      }

      .loading-bar {
        stroke-dasharray: 800;
        stroke-dashoffset: 800;
        animation: drawLine 3s infinite alternate ease-in-out;
      }

      .rotating-gear {
        transform-origin: 700px 150px;
        animation: rotateHub 20s infinite linear;
      }
    </style>

    <!-- Gradients -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="50%" stop-color="#8A2BE2" />
      <stop offset="100%" stop-color="#39FF14" />
    </linearGradient>

    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#39FF14" />
    </linearGradient>

    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" class="grid" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" class="bg" />
  
  <!-- Grid -->
  <rect width="800" height="300" fill="url(#gridPattern)" class="animated-grid" />

  <!-- Cyberpunk Tech Circle / Gear in Background -->
  <g class="rotating-gear" opacity="0.15">
    <circle cx="700" cy="150" r="80" fill="none" stroke="#00E5FF" stroke-width="2" stroke-dasharray="10 15" />
    <circle cx="700" cy="150" r="60" fill="none" stroke="#39FF14" stroke-width="1" stroke-dasharray="40 20" />
    <circle cx="700" cy="150" r="40" fill="none" stroke="#8A2BE2" stroke-width="3" stroke-dasharray="5 5" />
  </g>

  <!-- Cyberpunk Tech Accents (Corner Brackets) -->
  <path d="M 20 50 L 20 20 L 50 20" fill="none" stroke="#00E5FF" stroke-width="3" class="glow-cyan" />
  <path d="M 780 50 L 780 20 L 750 20" fill="none" stroke="#00E5FF" stroke-width="3" class="glow-cyan" />
  <path d="M 20 250 L 20 280 L 50 280" fill="none" stroke="#39FF14" stroke-width="3" class="glow-green" />
  <path d="M 780 250 L 780 280 L 750 280" fill="none" stroke="#39FF14" stroke-width="3" class="glow-green" />

  <!-- Particles -->
  <circle cx="150" cy="220" r="4" fill="#39FF14" class="particle-1 glow-green" />
  <circle cx="350" cy="260" r="3" fill="#00E5FF" class="particle-2 glow-cyan" />
  <circle cx="550" cy="180" r="5" fill="#8A2BE2" class="particle-3 glow-purple" />
  <circle cx="650" cy="240" r="2" fill="#39FF14" class="particle-1 glow-green" />
  <circle cx="250" cy="190" r="4" fill="#00E5FF" class="particle-3 glow-cyan" />

  <!-- Scanning Line -->
  <line x1="0" y1="0" x2="800" y2="0" stroke="rgba(0, 229, 255, 0.15)" stroke-width="2" class="scan" />

  <!-- Main Content -->
  <g transform="translate(100, 110)">
    <!-- Tech Label -->
    <text x="0" y="-30" class="subtitle" fill="#8A2BE2">&lt;DEVELOPER &amp; CREATIVE&gt;</text>
    
    <!-- Title -->
    <text x="0" y="20" class="title" fill="url(#titleGrad)">MUHAMMAD HANZALA</text>
    
    <!-- Typing/Blinking Subtitle -->
    <text x="0" y="55" class="subtitle blink-text">ANDROID DEVELOPER // UI-UX DESIGNER // VIDEO EDITOR</text>
    
    <!-- Decorative Progress Bar -->
    <line x1="0" y1="80" x2="600" y2="80" stroke="#141B29" stroke-width="4" stroke-linecap="round" />
    <line x1="0" y1="80" x2="600" y2="80" stroke="url(#barGrad)" stroke-width="4" stroke-linecap="round" class="loading-bar glow-cyan" />
  </g>

  <!-- System Status Text -->
  <text x="630" y="275" font-family="Share Tech Mono" font-size="12" fill="#39FF14" opacity="0.8">SYSTEM STATUS: ACTIVE [OK]</text>
  <circle cx="620" cy="271" r="4" fill="#39FF14" class="glow-green" />
</svg>
